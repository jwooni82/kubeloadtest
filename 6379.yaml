apiVersion: apps/v1
kind: Deployment
metadata:
  name: 6379
  labels:
    app: 6379
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 6379
  template:
    metadata:
      labels:
        app: 6379
    spec:
      containers:
      - name: 6379
        image: 6379:6379
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: 6379-svc
spec:
  selector:
    app: 6379
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP